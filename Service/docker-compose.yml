services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:v1.0.20210914-ls212
    container_name: wireguard-gateway
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SERVERURL=${SERVERURL}
      - SERVERPORT=${SERVERPORT}
      - PEERS=${PEERS}
      - PEERDNS=10.0.0.53  # On pointe vers l'IP fixe du Pi-hole dans le réseau Docker
      - INTERNAL_SUBNET=${INTERNAL_SUBNET}
      - ALLOWEDIPS=${ALLOWEDIPS}
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    ports:
      - "${SERVERPORT}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      vpn_net:
        ipv4_address: 10.0.0.2
    restart: unless-stopped

  pihole:
    image: pihole/pihole:2025.02.2
    container_name: pihole-dns
    environment:
      - TZ=${TZ}
      - WEBPASSWORD=${WEBPASSWORD}
      - FTLCONF_LOCAL_IPV4=10.0.0.53
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "8080:80/tcp"
    networks:
      vpn_net:
        ipv4_address: 10.0.0.53
    restart: unless-stopped

networks:
  vpn_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
