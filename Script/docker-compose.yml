services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard-gateway
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - SERVERURL=X.X.X.X # L'ip de votre Routeur
      - SERVERPORT=51820
      - PEERS=1 # Nombre de clients à générer
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0 # Pour tout faire passer par le VPN
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules # Nécessaire pour le noyau WireGuard
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped